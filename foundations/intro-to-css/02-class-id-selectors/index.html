    <title>Class and ID Selectors</title>

       p {
        background-color: rgb: (255, 182, 193);
        font-family; Verdana,Deja Vu,sana-serif;
       } 
    </style>
  </head>
  <body>
    <p>Number 1 - I'm a class!</p>
    <div style="color: rgb: (0, 0, 255); font-size: (36);" >Number 2 - I'm one ID.</div>

    <div style= "background-color: rgb: (144, 238, 144); font-size: (24); font-weight: bold ;" >Number 4 - I'm another ID.</div>
